services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portic
      POSTGRES_PASSWORD: portic
      POSTGRES_DB: portic_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portic -d portic_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://portic:portic@db:5432/portic_crm
      WEB_URL: http://localhost:3002
      API_PUBLIC_URL: http://localhost:8002
      CORS_ALLOWED_ORIGINS: http://localhost:3002,http://127.0.0.1:3002
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A portic_crm.config worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://portic:portic@db:5432/portic_crm
      WEB_URL: http://localhost:3002
      API_PUBLIC_URL: http://localhost:8002
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery_beat:
    build: .
    command: celery -A portic_crm.config beat -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://portic:portic@db:5432/portic_crm
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3002:3002"
    environment:
      API_INTERNAL_URL: http://web:8000
      NEXT_PUBLIC_API_URL: http://localhost:8002
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
