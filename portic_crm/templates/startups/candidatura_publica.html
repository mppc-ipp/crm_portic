<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>{{ formulario.titulo }}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="container">
  <h1>{{ formulario.titulo }}</h1>
  <form method="post">
    {% csrf_token %}
    {% for campo in campos %}
    <p><label>{{ campo.nome }}{% if campo.obrigatorio %} *{% endif %}<br>
      {% if campo.tipo == "TEXTAREA" %}
      <textarea name="campo_{{ campo.id }}" {% if campo.obrigatorio %}required{% endif %}></textarea>
      {% elif campo.tipo == "CHOICE" %}
      <select name="campo_{{ campo.id }}" {% if campo.obrigatorio %}required{% endif %}>
        <option value="">—</option>
        {% for op in campo.opcoes %}<option value="{{ op }}">{{ op }}</option>{% endfor %}
      </select>
      {% else %}
      <input type="{% if campo.tipo == 'EMAIL' %}email{% elif campo.tipo == 'NUMBER' %}number{% else %}text{% endif %}" name="campo_{{ campo.id }}" {% if campo.obrigatorio %}required{% endif %}>
      {% endif %}
    </label></p>
    {% endfor %}
    <button type="submit" class="btn">Submeter candidatura</button>
  </form>
</div>
</body>
</html>
